<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personnages Historiques — Révisions Brevet 3e</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:      #1a1610;
      --paper:    #f5f0e8;
      --sepia:    #c8b89a;
      --gold:     #b8922a;
      --rust:     #8b3a2f;
      --muted:    #7a6e60;
      --card-bg:  #faf7f2;
      --border:   #d6cfc4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--ink);
      color: var(--paper);
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
      border-bottom: 4px solid var(--gold);
      position: relative;
    }

    header .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    header .subtitle {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      color: var(--sepia);
      font-style: italic;
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 1.5rem 1rem 0.5rem;
    }

    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
    }

    /* ── GRID ── */
    .grid-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
    }

    .count-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: right;
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(26,22,16,0.13);
      border-color: var(--gold);
    }

    .card-photo {
      width: 100%;
      aspect-ratio: 3/2;
      object-fit: cover;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      filter: sepia(20%) contrast(1.05);
    }

    .card-photo-placeholder {
      width: 100%;
      aspect-ratio: 3/2;
      background: linear-gradient(135deg, #2a2520 0%, #3d3630 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .card-photo-placeholder .initials {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
      opacity: 0.8;
    }

    .card-photo-placeholder .photo-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--sepia);
      opacity: 0.6;
      text-transform: uppercase;
    }

    .card-body {
      padding: 1rem 1rem 1.1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-era {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.35rem;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    .card p {
      font-size: 0.82rem;
      line-height: 1.55;
      color: var(--muted);
      flex: 1;
    }

    .card-arrow {
      margin-top: 0.9rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── SEARCH ── */
    .search-wrap {
      display: flex;
      justify-content: center;
      padding: 1rem 1rem 0;
    }

    .search-wrap input {
      font-family: 'Source Serif 4', serif;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      background: var(--card-bg);
      color: var(--ink);
      width: 100%;
      max-width: 380px;
      outline: none;
    }

    .search-wrap input:focus {
      border-color: var(--gold);
    }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
      .card h2 { font-size: 0.9rem; }
      .card p { display: none; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Révisions Brevet — Classe de 3e</p>
  <h1>Personnages<br>Historiques</h1>
  <p class="subtitle">22 figures clés du programme — du XXe siècle à nos jours</p>
</header>

<div class="search-wrap">
  <input type="search" id="search" placeholder="Rechercher un personnage…" aria-label="Recherche" />
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">Tous</button>
  <button class="filter-btn" data-filter="grande-guerre">Grande Guerre & après</button>
  <button class="filter-btn" data-filter="ww2">Seconde Guerre mondiale</button>
  <button class="filter-btn" data-filter="guerre-froide">Guerre froide</button>
  <button class="filter-btn" data-filter="europe">Construction européenne</button>
</div>

<div class="grid-wrapper">
  <p class="count-label" id="count">22 personnages</p>
  <div class="grid" id="grid">

    <!-- Cards are injected by JS below -->

  </div>
</div>

<footer>Révisions Brevet — 3e &nbsp;·&nbsp; Histoire-Géographie</footer>

<script>

  {

    photo: null

  {
    id: "jaures",

    filtre: "grande-guerre",

    resume: "Dirigeant révolutionnaire bolchévique, il mène la révolution d'Octobre 1917 et fonde l'URSS, premier État communiste du monde.",
    photo: null

    photo: null
  },
  {
    id: "mussolini",
    nom: "Benito Mussolini",
    ere: "Seconde Guerre mondiale",
    filtre: "ww2",
    initiales: "BM",
    resume: "Dictateur italien, fondateur du régime fasciste dans l'entre-deux-guerres, il s'allie à Hitler et entraîne l'Italie dans la guerre.",
    photo: null
  },
  {
    id: "de-gaulle",
    nom: "Charles de Gaulle",
    ere: "Seconde Guerre mondiale",
    filtre: "ww2",
    initiales: "CG",
    resume: "Chef de la France libre depuis Londres à partir de 1940, il rétablit la République à la Libération et fonde la Ve République en 1958.",
    photo: null
  },
  {
    id: "petain",
    nom: "Philippe Pétain",
    ere: "Seconde Guerre mondiale",
    filtre: "ww2",
    initiales: "PP",
    resume: "Héros de la bataille de Verdun (1916), il dirige le régime de Vichy de 1940 à 1944 et engage la France dans la collaboration avec l'Allemagne nazie.",
    photo: null
  },
  {
    id: "moulin",
    nom: "Jean Moulin",
    ere: "Seconde Guerre mondiale",
    filtre: "ww2",
    initiales: "JM",
    resume: "Résistant et délégué de de Gaulle en France, il unifie les mouvements de résistance intérieure. Arrêté par la Gestapo en 1943, il meurt sous la torture.",
    photo: null
  },
  {
    id: "roosevelt",
    nom: "Franklin D. Roosevelt",
    ere: "Seconde Guerre mondiale",
    filtre: "ww2",
    initiales: "FR",
    resume: "Président des États-Unis de 1933 à 1945, il relance l'économie américaine avec le New Deal puis engage son pays dans la Seconde Guerre mondiale.",
    photo: null
  },
  {
    id: "churchill",
    nom: "Winston Churchill",
    ere: "Seconde Guerre mondiale",
    filtre: "ww2",
    initiales: "WC",
    resume: "Premier ministre britannique de 1940 à 1945, il incarne la résistance face à Hitler et refuse tout compromis avec l'Allemagne nazie.",
    photo: null
  },
  {
    id: "aubrac",
    nom: "Lucie Aubrac",
    ere: "Seconde Guerre mondiale",
    filtre: "ww2",
    initiales: "LA",
    resume: "Résistante française, elle prend part aux réseaux de résistance et réussit à faire libérer son mari Raymond Aubrac des griffes de la Gestapo.",

  },
  {
    id: "tillion",
    nom: "Germaine Tillion",
    ere: "Seconde Guerre mondiale",

  {

    resume: "Rescapée de la Shoah, elle devient ministre de la Santé et fait adopter la loi légalisant l'IVG en 1975, malgré une violente opposition.",
    photo: null
  },
  {
    id: "nehru",
    nom: "Jawaharlal Nehru",
    ere: "Guerre froide",
    filtre: "guerre-froide",
    initiales: "JN",
    resume: "Dirigeant du mouvement d'indépendance indien aux côtés de Gandhi, il devient le premier chef du gouvernement de l'Inde indépendante en 1947.",
    photo: null
  },
  {
    id: "nasser",
    nom: "Gamal Abdel Nasser",
    ere: "Guerre froide",
    filtre: "guerre-froide",
    initiales: "GN",
    resume: "Président égyptien, il symbolise le nationalisme arabe et la décolonisation, et nationalise le canal de Suez en 1956.",
    photo: null
  },
  {
    id: "truman",
    nom: "Harry S. Truman",
    ere: "Guerre froide",
    filtre: "guerre-froide",
    initiales: "HT",
    resume: "Président américain, il prend la décision de lancer la bombe atomique sur le Japon (1945), puis lance la politique d'endiguement du communisme et le plan Marshall.",
    photo: null
  },
  {
    id: "khrouchtchev",
    nom: "Nikita Khrouchtchev",
    ere: "Guerre froide",
    filtre: "guerre-froide",

    resume: "Dirigeant soviétique, il dénonce les crimes de Staline en 1956 puis gère des moments de crise intense, dont la crise des missiles de Cuba en 1962.",
    photo: null
  },
  {
    id: "gorbatchev",
    nom: "Mikhaïl Gorbatchev",
    ere: "Guerre froide",
    filtre: "guerre-froide",
    initiales: "MG",
    resume: "Dernier dirigeant de l'URSS, il engage des réformes (glasnost, perestroïka) qui contribuent à la chute du mur de Berlin et à la fin de la guerre froide.",
    photo: null
  },
  {
    id: "schuman",
    nom: "Robert Schuman",
    ere: "Construction européenne",
    filtre: "europe",
    initiales: "RS",
    resume: "Homme politique français d'origine lorraine, il propose en 1950 la mise en commun des productions de charbon et d'acier franco-allemandes : c'est l'acte fondateur de la construction européenne.",
    photo: null
  },
  {
    id: "mitterrand",
    nom: "François Mitterrand",
    ere: "Construction européenne",
    filtre: "europe",
    initiales: "FM",
    resume: "Président de la République française de 1981 à 1995, il accompagne la réunification allemande et signe le traité de Maastricht (1992), étape majeure de l'Union européenne.",
    photo: null
  },
  {
    id: "guerre-froide",
    nom: "La Guerre froide",
    ere: "Notion clé",
    filtre: "guerre-froide",
    initiales: "GF",
    resume: "Période de tensions (1947–1991) opposant les États-Unis et l'URSS sans affrontement militaire direct, marquée par la course aux armements et des crises régionales.",
    photo: null
  }
];

function getInitials(nom) {
  return nom.split(" ").filter(w => w.length > 2).map(w => w[0]).join("").toUpperCase().slice(0,2);
}

function renderCard(p) {
  const photoHtml = p.photo
    ? `<div class="card-photo"><img src="${p.photo}" alt="Portrait de ${p.nom}" loading="lazy" /></div>`
    : `<div class="card-photo-placeholder">
         <span class="initials">${p.initiales}</span>
         <span class="photo-label">photo à venir</span>
       </div>`;

  return `
    <a class="card" href="personnages/${p.id}.html" data-filtre="${p.filtre}">
      ${photoHtml}
      <div class="card-body">
        <span class="card-era">${p.ere}</span>
        <h2>${p.nom}</h2>
        <p>${p.resume}</p>
        <span class="card-arrow">Voir la fiche →</span>
      </div>
    </a>`;
}

const grid = document.getElementById("grid");
const countEl = document.getElementById("count");

function render(filter, query) {
  const q = (query || "").toLowerCase().trim();
  const visible = personnages.filter(p => {
    const matchFilter = filter === "all" || p.filtre === filter;
    const matchQuery = !q || p.nom.toLowerCase().includes(q) || p.ere.toLowerCase().includes(q) || p.resume.toLowerCase().includes(q);
    return matchFilter && matchQuery;
  });
  grid.innerHTML = visible.map(renderCard).join("");
  countEl.textContent = `${visible.length} personnage${visible.length > 1 ? "s" : ""}`;
}

let currentFilter = "all";
render(currentFilter, "");

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render(currentFilter, document.getElementById("search").value);
  });
});

document.getElementById("search").addEventListener("input", e => {
  render(currentFilter, e.target.value);
});
</script>

</body>
</html>
